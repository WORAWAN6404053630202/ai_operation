version: '3.9'

services:
  serve:
    container_name: ai-operation-dev
    image: ai-operation:dev
    platform: linux/amd64
    build:
      context: .
      target: develop
      dockerfile: ./Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Mount code สำหรับ hot-reload
      - ./code:/app/code
      # Mount env file
      - ./env.properties:/app/env.properties
    environment:
      - PYTHONPATH=/app/code
    env_file:
      - ./env.properties
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  default:
    name: ai-operation-network
